<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torneo Alcaeda</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="mini-label">⚽ FIFA 26 · Torneo</div>
      <h1>SuperLeague Alcaeda</h1>
    </section>

    <section class="carousel">
      <div class="track" id="carouselTrack">
        <img src="img/banner/banner1.jpg" alt="Banner 1">
        <img src="img/banner/banner2.jpg" alt="Banner 2">
        <img src="img/banner/banner3.jpg" alt="Banner 3">
      </div>
      <div class="dots" id="dots"></div>
    </section>

    <section class="premios">
      <div class="section-head">
        <h2>Logros</h2>
      </div>

      <div class="premios-grid">
        <article class="premio">
          <span>🚌</span>
          <div>
            <h3>Modo ATM</h3>
            <p>Para el que no le gusta que le metan la bola</p>
          </div>
        </article>

        <article class="premio">
          <span>⚽</span>
          <div>
            <h3>Valera</h3>
            <p>El cojo</p>
          </div>
        </article>

        <article class="premio">
          <span>🦆</span>
          <div>
            <h3>Premio revelación</h3>
            <p>Para que porfin te liberes</p>
          </div>
        </article>
      </div>
    </section>

    <section class="cards">
      <a class="mode-card clubes" href="clubes.html">
        <span>🏆</span>
        <div>
          <h2>Torneo Clubes</h2>
          <p>champions League</p>
        </div>
      </a>

      <a class="mode-card paises" href="paises.html">
        <span>🌍</span>
        <div>
          <h2>Torneo Países</h2>
          <p>Mundial</p>
        </div>
      </a>
    </section>
  </main>

  <script src="js/index.js"></script>
</body>
</html>
